  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n\n\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Spectrum of AI Visibility · Cycle of Experience — Field Notes<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<style>/* latin-ext */\n@font-face {\n  font-family: 'Architects Daughter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"1408ae8a-02c5-4751-82ae-9739500ed765\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Architects Daughter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"50a5abac-1c9c-4199-b771-b1f65d99d8a9\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody {\n  background: #e8e4dc;\n  min-height: 100vh;\n  display: flex;\n  align-items: flex-start;\n  justify-content: center;\n  padding: 48px 32px 64px;\n  font-family: 'Architects Daughter', 'Marker Felt Thin', 'Bradley Hand', 'Segoe Print', cursive;\n}\n\n.page {\n  width: 1056px;\n  background: #ffffff;\n  padding: 44px 60px 44px;\n  box-shadow: 0 1px 1px rgba(0,0,0,0.08), 0 4px 8px rgba(0,0,0,0.1), 0 12px 32px rgba(0,0,0,0.14), 0 32px 64px rgba(0,0,0,0.08);\n  display: flex;\n  flex-direction: column;\n}\n\n/* ── TOP BAR ── */\n.top-bar {\n  display: flex;\n  justify-content: space-between;\n  align-items: baseline;\n  margin-bottom: 72px;\n}\n.series-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #ccc; }\n.page-num     { font-size: 9px; letter-spacing: 0.1em; color: #ccc; }\n\n/* ── FRAMEWORK LABEL ── */\n.framework-label {\n  font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: #bdb800;\n  margin-bottom: 20px;\n}\n\n/* ── TITLE BAND ── */\n.title-band {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  margin-bottom: 72px;\n}\n.title-eyebrow { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #bbb; margin-bottom: 6px; }\n.page-title    { font-size: 32px; color: #111; line-height: 1.1; }\n.title-sub     { font-size: 11px; color: #aaa; letter-spacing: 0.04em; padding-bottom: 5px; }\n\n.rule { width: 100%; height: 1px; background: #111; margin-bottom: 40px; display: none; }\n\n/* ── SPECTRUM BAR ── */\n.spectrum-block { margin-bottom: 72px; }\n.spectrum-axis-label {\n  font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase; color: #ccc; margin-bottom: 7px;\n}\n.spectrum-endpoints { display: flex; justify-content: space-between; margin-bottom: 4px; }\n.endpoint-label { font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #bbb; }\n.spectrum-svg { width: 100%; height: 9px; display: block; }\n\n.spectrum-ticks { display: flex; justify-content: space-between; }\n.tick { display: flex; flex-direction: column; align-items: center; flex: 1; }\n.tick:first-child { align-items: flex-start; }\n.tick:last-child  { align-items: flex-end; }\n.tick-mark  { width: 1px; height: 5px; background: #111; margin-bottom: 4px; }\n.tick-class { font-size: 10.5px; color: #111; text-align: center; white-space: nowrap; margin-bottom: 2px; }\n.tick-label { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: #bbb; text-align: center; white-space: nowrap; }\n.tick:first-child .tick-class,\n.tick:first-child .tick-label { text-align: left; }\n.tick:last-child .tick-class,\n.tick:last-child .tick-label  { text-align: right; }\n\n/* ── THE GRID ── */\n.classes-grid {\n  display: grid;\n  grid-template-columns: repeat(5, 1fr);\n  grid-template-rows:\n    auto   /* row 1: index */\n    auto   /* row 2: name */\n    auto   /* row 3: tagline */\n    1px    /* row 4: rule */\n    1fr    /* row 5: definition — stretches to fill */\n    auto;  /* row 6: examples (or customer q) */\n  margin-top: 4px;\n}\n\n/* Column dividers */\n.g-index.c1, .g-name.c1, .g-tagline.c1, .g-rule.c1, .g-def.c1, .g-ex.c1,\n.g-index.c2, .g-name.c2, .g-tagline.c2, .g-rule.c2, .g-def.c2, .g-ex.c2,\n.g-index.c3, .g-name.c3, .g-tagline.c3, .g-rule.c3, .g-def.c3, .g-ex.c3,\n.g-index.c4, .g-name.c4, .g-tagline.c4, .g-rule.c4, .g-def.c4, .g-ex.c4 {\n  border-right: 0.5px solid #e8e8e8;\n}\n\n/* Shared horizontal padding */\n.g-index, .g-name, .g-tagline, .g-rule, .g-def, .g-ex {\n  padding-left: 18px;\n  padding-right: 18px;\n}\n.g-index.c1, .g-name.c1, .g-tagline.c1, .g-rule.c1, .g-def.c1, .g-ex.c1 { padding-left: 0; }\n.g-index.c5, .g-name.c5, .g-tagline.c5, .g-rule.c5, .g-def.c5, .g-ex.c5 { padding-right: 0; }\n\n.g-index {\n  grid-row: 1;\n  font-size: 8.5px; letter-spacing: 0.16em; color: #ccc;\n  padding-top: 14px; padding-bottom: 4px;\n  align-self: end;\n}\n.g-name {\n  grid-row: 2;\n  font-size: 16px; color: #111; line-height: 1.1;\n  padding-bottom: 4px;\n  align-self: start;\n  white-space: nowrap;\n}\n.g-tagline {\n  grid-row: 3;\n  font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: #aaa;\n  padding-bottom: 10px;\n  align-self: start;\n  white-space: nowrap;\n}\n.g-rule {\n  grid-row: 4;\n  background: #e0e0e0;\n  align-self: stretch;\n  margin-left: 18px; margin-right: 18px;\n}\n.g-rule.c1 { margin-left: 0; }\n.g-rule.c5 { margin-right: 0; }\n.g-ex {\n  grid-row: 6;\n  font-size: 9.5px; color: #aaa; line-height: 1.6;\n  padding-top: 6px; padding-bottom: 14px;\n  align-self: start;\n}\n.g-def {\n  grid-row: 5;\n  font-size: 11px; color: #333; line-height: 1.65;\n  padding-top: 12px; padding-bottom: 6px;\n  align-self: start;\n}\n\n.c1 { grid-column: 1; }\n.c2 { grid-column: 2; }\n.c3 { grid-column: 3; }\n.c4 { grid-column: 4; }\n.c5 { grid-column: 5; }\n\n/* ── CIRCULAR CYCLE DIAGRAM (donut) ── */\n.cycle-block { margin-bottom: 72px; }\n.cycle-axis-label {\n  font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase; color: #ccc;\n  margin-bottom: 20px;\n  text-align: center;\n}\n.cycle-stage {\n  width: 520px; height: 520px; margin: 0 auto;\n}\n.cycle-svg { width: 100%; height: 100%; display: block; overflow: visible; }\n\n/* donut segments — light outlined ring */\n.donut-seg {\n  fill: none;\n  stroke: #111;\n  stroke-width: 1;\n}\n\n/* outside labels */\n.seg-num {\n  font-family: inherit;\n  font-size: 11px; letter-spacing: 0.18em; fill: #ccc;\n}\n.seg-name {\n  font-family: inherit;\n  font-size: 22px; fill: #111;\n}\n.seg-sub {\n  font-family: inherit;\n  font-size: 13px; fill: #888; font-style: italic;\n}\n\n/* center label */\n.cycle-center-top {\n  font-family: inherit;\n  font-size: 10px; letter-spacing: 0.28em; fill: #111;\n}\n.cycle-center {\n  font-family: inherit;\n  font-size: 22px; fill: #111;\n}\n\n/* ── SECTION DIVIDER ── */\n.section-break {\n  margin: 96px 0 0 0;\n}\n\n/* customer question styling — mirrors examples row visually but italic */\n.g-question {\n  grid-row: 6;\n  font-size: 11px; color: #111; line-height: 1.5;\n  padding-top: 6px; padding-bottom: 14px;\n  align-self: start;\n  padding-left: 18px; padding-right: 18px;\n  font-style: italic;\n}\n.g-question.c1 { padding-left: 0; }\n.g-question.c5 { padding-right: 0; }\n.g-question.c1, .g-question.c2, .g-question.c3, .g-question.c4 {\n  border-right: 0.5px solid #e8e8e8;\n}\n\n/* ── FOOTER ── */\n.page-footer {\n  padding-top: 16px;\n  border-top: 0.5px solid #e8e8e8;\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  margin-top: 72px;\n}\n.footer-sig  { font-size: 10px; color: #ccc; letter-spacing: 0.06em; }\n.footer-copy { font-size: 9px;  color: #ddd; letter-spacing: 0.06em; }\n.footer-date { font-size: 9px;  color: #ccc; letter-spacing: 0.1em;  }\n<\u002Fstyle>\n<\u002Fhead>\n<body data-cc-id=\"cc-1\" style=\"cursor: crosshair;\">\n<div class=\"page\">\n\n  <div class=\"top-bar\">\n    <span class=\"series-label\">Field Notes · AI Design<\u002Fspan>\n    <span class=\"page-num\"><\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ─────────────── FRAMEWORK 01 ─────────────── -->\n  <div class=\"framework-label\">Framework 01<\u002Fdiv>\n\n  <div class=\"title-band\">\n    <div>\n      <div class=\"title-eyebrow\">A spectrum of AI integration<\u002Fdiv>\n      <h1 class=\"page-title\">Spectrum of AI Visibility<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"title-sub\">invisible to user &nbsp;→&nbsp; primary interface<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"rule\"><\u002Fdiv>\n\n  <div class=\"spectrum-block\">\n    <div class=\"spectrum-axis-label\">AI visibility to user<\u002Fdiv>\n    <div class=\"spectrum-endpoints\">\n      <span class=\"endpoint-label\">Invisible<\u002Fspan>\n      <span class=\"endpoint-label\">Primary Interface<\u002Fspan>\n    <\u002Fdiv>\n    <svg class=\"spectrum-svg\" viewBox=\"0 0 936 9\" xmlns=\"http://www.w3.org/2000/svg\" preserveAspectRatio=\"none\">\n      <polygon points=\"0,4 936,0 936,9 0,5\" fill=\"#111\"><\u002Fpolygon>\n    <\u002Fsvg>\n    <div class=\"spectrum-ticks\">\n      <div class=\"tick\"><div class=\"tick-mark\"><\u002Fdiv><div class=\"tick-class\">AI-Ambient<\u002Fdiv><div class=\"tick-label\">Invisible<\u002Fdiv><\u002Fdiv>\n      <div class=\"tick\"><div class=\"tick-mark\"><\u002Fdiv><div class=\"tick-class\">AI-Embedded<\u002Fdiv><div class=\"tick-label\">Signaled<\u002Fdiv><\u002Fdiv>\n      <div class=\"tick\"><div class=\"tick-mark\"><\u002Fdiv><div class=\"tick-class\">AI-Assisted<\u002Fdiv><div class=\"tick-label\">Just-in-time<\u002Fdiv><\u002Fdiv>\n      <div class=\"tick\"><div class=\"tick-mark\"><\u002Fdiv><div class=\"tick-class\">AI-Elective<\u002Fdiv><div class=\"tick-label\">Elective<\u002Fdiv><\u002Fdiv>\n      <div class=\"tick\"><div class=\"tick-mark\"><\u002Fdiv><div class=\"tick-class\">AI-Native<\u002Fdiv><div class=\"tick-label\">Primary<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"classes-grid\">\n    <!-- ROW 1: index -->\n    <div class=\"g-index c1\">01<\u002Fdiv>\n    <div class=\"g-index c2\">02<\u002Fdiv>\n    <div class=\"g-index c3\">03<\u002Fdiv>\n    <div class=\"g-index c4\">04<\u002Fdiv>\n    <div class=\"g-index c5\">05<\u002Fdiv>\n\n    <!-- ROW 2: name -->\n    <div class=\"g-name c1\">AI-Ambient<\u002Fdiv>\n    <div class=\"g-name c2\">AI-Embedded<\u002Fdiv>\n    <div class=\"g-name c3\">AI-Assisted<\u002Fdiv>\n    <div class=\"g-name c4\">AI-Elective<\u002Fdiv>\n    <div class=\"g-name c5\">AI-Native<\u002Fdiv>\n\n    <!-- ROW 3: tagline -->\n    <div class=\"g-tagline c1\">Invisible · Backend<\u002Fdiv>\n    <div class=\"g-tagline c2\">Visible · Signaled<\u002Fdiv>\n    <div class=\"g-tagline c3\">Just-in-time · In-context<\u002Fdiv>\n    <div class=\"g-tagline c4\">Optional · Host Product<\u002Fdiv>\n    <div class=\"g-tagline c5\">Primary · Standalone<\u002Fdiv>\n\n    <!-- ROW 4: rule -->\n    <div class=\"g-rule c1\"><\u002Fdiv>\n    <div class=\"g-rule c2\"><\u002Fdiv>\n    <div class=\"g-rule c3\"><\u002Fdiv>\n    <div class=\"g-rule c4\"><\u002Fdiv>\n    <div class=\"g-rule c5\"><\u002Fdiv>\n\n    <!-- ROW 5: definition -->\n    <div class=\"g-def c1\">AI powers part of the host product but the user may not know it's there. No badge, no disclaimer, no sparkle icon. Results just seem better.<\u002Fdiv>\n    <div class=\"g-def c2\">AI is visibly marked — badges, \"AI-powered\" labels, sparkle icons. No discrete CTA. Woven into the product, and the user knows it's there.<\u002Fdiv>\n    <div class=\"g-def c3\">AI surfaces a specific suggestion in context — inside a host product the user is already in. Uninvoked.<\u002Fdiv>\n    <div class=\"g-def c4\">An optional AI capability inside a host product. The user elects to use it — never on by default. It has its own UI surface: a button, a sidebar, a panel.<\u002Fdiv>\n    <div class=\"g-def c5\">The entire product is the AI. No host product. AI is the interface, the value, and the interaction model. The user's relationship is with the AI itself.<\u002Fdiv>\n\n    <!-- ROW 6: examples -->\n    <div class=\"g-ex c1\">Smart inbox sorting · Predictive caching · Fraud scoring · Recommendation ranking · Spotify Discover · Netflix ordering<\u002Fdiv>\n    <div class=\"g-ex c2\">ServiceNow AI-classified tickets · Jira smart priority · LinkedIn \"AI-generated\" labels · Figma AI badge<\u002Fdiv>\n    <div class=\"g-ex c3\">Grammarly inline corrections · GitHub Copilot ghost text · Superhuman Instant Reply · Apple Smart Compose<\u002Fdiv>\n    <div class=\"g-ex c4\">Copilot sidebar in Word · \"Summarize\" in Notion · Salesforce Einstein panel · Confluence Audio Briefings<\u002Fdiv>\n    <div class=\"g-ex c5\">Claude · ChatGPT · Gemini · Perplexity · Midjourney · Cursor · Runway<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ─────────────── FRAMEWORK 02 ─────────────── -->\n  <div class=\"section-break\"><\u002Fdiv>\n  <div class=\"framework-label\">Framework 02<\u002Fdiv>\n\n  <div class=\"title-band\">\n    <div>\n      <div class=\"title-eyebrow\">The stages a user moves through<\u002Fdiv>\n      <h1 class=\"page-title\">Cycle of Experience<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"title-sub\" data-cc-id=\"cc-2\" style=\"\"><br><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"cycle-block\">\n    <div class=\"cycle-axis-label\" data-cc-id=\"cc-3\" style=\"\">User journey with AI<\u002Fdiv>\n    <div class=\"cycle-stage\">\n      <svg class=\"cycle-svg\" viewBox=\"-60 -40 640 620\" xmlns=\"http://www.w3.org/2000/svg\" aria-label=\"Cycle of Experience\">\n        <!-- 5 equal donut segments (72° each), clockwise from top. -->\n        <!-- r=180, stroke=42 → inner edge 159, outer edge 201. -->\n        <defs>\n          <marker id=\"cycle-arrowhead\" viewBox=\"0 0 10 10\" refX=\"8\" refY=\"5\" markerWidth=\"9\" markerHeight=\"9\" orient=\"auto-start-reverse\">\n            <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#111\"><\u002Fpath>\n          <\u002Fmarker>\n        <\u002Fdefs>\n\n        <!-- Arc from 1 o'clock (Encounter) clockwise ~300° to 11 o'clock, with arrowhead at end. -->\n        <path class=\"donut-seg\" fill=\"none\" stroke-width=\"1\" d=\"M 350 104.12 A 180 180 0 1 1 170 104.12\" marker-end=\"url(#cycle-arrowhead)\"><\u002Fpath>\n\n        <!-- white gap lines removed (thin stroke, no gaps needed) -->\n        <g style=\"display:none\">\n          <line x1=\"260\" y1=\"79\" x2=\"260\" y2=\"281\"><\u002Fline>                 <!-- -90 -->\n          <line x1=\"431.95\" y1=\"204.69\" x2=\"259.05\" y2=\"261.02\"><\u002Fline>     <!-- -18: (x1,y1) outer at r=201, (x2,y2) inner at r=159 (target same angle) -->\n          <line x1=\"366.10\" y1=\"406.55\" x2=\"260.95\" y2=\"258.98\"><\u002Fline>     <!-- 54 -->\n          <line x1=\"153.90\" y1=\"406.55\" x2=\"259.05\" y2=\"258.98\"><\u002Fline>     <!-- 126 -->\n          <line x1=\"88.05\" y1=\"204.69\" x2=\"260.95\" y2=\"261.02\"><\u002Fline>      <!-- 198 -->\n        <\u002Fg>\n\n        <!-- Segment labels, placed at midpoint angles on outer radius 245 -->\n        <!-- Segment labels pushed to r=265 for clearance from donut (outer edge ~222). -->\n        <!-- 01 Encounter @ -54° → (415.75, 105.47) -->\n        <g transform=\"translate(415.75,105.47)\">\n          <text class=\"seg-num\" text-anchor=\"start\" x=\"0\" y=\"-18\">01<\u002Ftext>\n          <text class=\"seg-name\" text-anchor=\"start\" x=\"0\" y=\"-2\">Encounter<\u002Ftext>\n          <text class=\"seg-sub\" text-anchor=\"start\" x=\"0\" y=\"14\">Did I choose this?<\u002Ftext>\n        <\u002Fg>\n\n        <!-- 02 Orient @ 18° → (512.02, 341.87) -->\n        <g transform=\"translate(512.02,341.87)\">\n          <text class=\"seg-num\" text-anchor=\"start\" x=\"0\" y=\"-18\">02<\u002Ftext>\n          <text class=\"seg-name\" text-anchor=\"start\" x=\"0\" y=\"-2\">Orient<\u002Ftext>\n          <text class=\"seg-sub\" text-anchor=\"start\" x=\"0\" y=\"14\">What is this?<\u002Ftext>\n        <\u002Fg>\n\n        <!-- 03 Engage @ 90° → (260, 525) -->\n        <g transform=\"translate(260,525)\">\n          <text class=\"seg-num\" text-anchor=\"middle\" x=\"0\" y=\"-18\">03<\u002Ftext>\n          <text class=\"seg-name\" text-anchor=\"middle\" x=\"0\" y=\"-2\">Engage<\u002Ftext>\n          <text class=\"seg-sub\" text-anchor=\"middle\" x=\"0\" y=\"14\">Does it work?<\u002Ftext>\n        <\u002Fg>\n\n        <!-- 04 Evaluate @ 162° → (7.98, 341.87) -->\n        <g transform=\"translate(7.98,341.87)\">\n          <text class=\"seg-num\" text-anchor=\"end\" x=\"0\" y=\"-18\">04<\u002Ftext>\n          <text class=\"seg-name\" text-anchor=\"end\" x=\"0\" y=\"-2\">Evaluate<\u002Ftext>\n          <text class=\"seg-sub\" text-anchor=\"end\" x=\"0\" y=\"14\">Was it right?<\u002Ftext>\n        <\u002Fg>\n\n        <!-- 05 Integrate @ 234° → (104.25, 105.47) -->\n        <g transform=\"translate(104.25,105.47)\">\n          <text class=\"seg-num\" text-anchor=\"end\" x=\"0\" y=\"-18\">05<\u002Ftext>\n          <text class=\"seg-name\" text-anchor=\"end\" x=\"0\" y=\"-2\">Integrate<\u002Ftext>\n          <text class=\"seg-sub\" text-anchor=\"end\" x=\"0\" y=\"14\">Do I keep it?<\u002Ftext>\n        <\u002Fg>\n\n        <!-- center label -->\n        <text class=\"cycle-center-top\" x=\"260\" y=\"248\" text-anchor=\"middle\">THE<\u002Ftext>\n        <text class=\"cycle-center\" x=\"260\" y=\"280\" text-anchor=\"middle\">AI Experience<\u002Ftext>\n        <text class=\"cycle-center\" x=\"260\" y=\"308\" text-anchor=\"middle\">Cycle<\u002Ftext>\n      <\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"classes-grid\">\n    <!-- ROW 1: index -->\n    <div class=\"g-index c1\">01<\u002Fdiv>\n    <div class=\"g-index c2\">02<\u002Fdiv>\n    <div class=\"g-index c3\">03<\u002Fdiv>\n    <div class=\"g-index c4\">04<\u002Fdiv>\n    <div class=\"g-index c5\">05<\u002Fdiv>\n\n    <!-- ROW 2: name -->\n    <div class=\"g-name c1\">Encounter<\u002Fdiv>\n    <div class=\"g-name c2\">Orient<\u002Fdiv>\n    <div class=\"g-name c3\">Engage<\u002Fdiv>\n    <div class=\"g-name c4\">Evaluate<\u002Fdiv>\n    <div class=\"g-name c5\">Integrate<\u002Fdiv>\n\n    <!-- ROW 3: tagline -->\n    <div class=\"g-tagline c1\">First contact<\u002Fdiv>\n    <div class=\"g-tagline c2\">Making sense<\u002Fdiv>\n    <div class=\"g-tagline c3\">Value delivered<\u002Fdiv>\n    <div class=\"g-tagline c4\">Trust tested<\u002Fdiv>\n    <div class=\"g-tagline c5\">Kept or rejected<\u002Fdiv>\n\n    <!-- ROW 4: rule -->\n    <div class=\"g-rule c1\"><\u002Fdiv>\n    <div class=\"g-rule c2\"><\u002Fdiv>\n    <div class=\"g-rule c3\"><\u002Fdiv>\n    <div class=\"g-rule c4\"><\u002Fdiv>\n    <div class=\"g-rule c5\"><\u002Fdiv>\n\n    <!-- ROW 5: definition -->\n    <div class=\"g-def c1\">The user meets the AI. Often they didn't ask — AI appeared in their tool, their inbox, their sidebar. The opening move is rarely theirs.<\u002Fdiv>\n    <div class=\"g-def c2\">The user tries to read the AI. What is it, what can it do, what are the rules, is it for me. First read is emotional as much as informational.<\u002Fdiv>\n    <div class=\"g-def c3\">The user actually uses the AI and gets output. Value is delivered — or it isn't. The moment most adoption models skip past.<\u002Fdiv>\n    <div class=\"g-def c4\">Every AI output is a claim the user has to adjudicate. Unique to AI — classic products don't need this stage. The button does what the button says.<\u002Fdiv>\n    <div class=\"g-def c5\">The user builds it into their workflow — or rejects it entirely. Binary, no middle. The next Encounter is either welcome or already lost.<\u002Fdiv>\n\n    <!-- ROW 6: customer question -->\n    <div class=\"g-question c1\">\"Did I choose this?\"<\u002Fdiv>\n    <div class=\"g-question c2\">\"What is this?\"<\u002Fdiv>\n    <div class=\"g-question c3\">\"Does it work?\"<\u002Fdiv>\n    <div class=\"g-question c4\">\"Was it right?\"<\u002Fdiv>\n    <div class=\"g-question c5\">\"Do I keep it?\"<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"page-footer\">\n    <span class=\"footer-sig\">Renna Al-Yassini<\u002Fspan>\n    <span class=\"footer-copy\">© 2026 Renna Al-Yassini · All rights reserved<\u002Fspan>\n    <span class=\"footer-date\">April 2026<\u002Fspan>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
